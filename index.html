<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>할 일 목록</h1>
            <p id="stats">0개의 할 일이 남았습니다</p>
        </header>

        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." required>
            <button type="submit" id="add-btn">추가</button>
        </form>

        <ul id="todo-list">
            <!-- 할 일 항목이 여기에 추가됩니다 -->
        </ul>
        
        <div id="empty-state" class="hidden">
            <p>할 일이 없습니다. 새로운 할 일을 추가해 보세요!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
